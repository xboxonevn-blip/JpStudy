<!DOCTYPE html>
<html lang="vi">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#17324D">
  <meta name="color-scheme" content="light">
  <meta name="description" content="JpStudy helps JLPT learners build vocabulary, grammar, kanji, and handwriting skills with FSRS spaced repetition and local-first progress tracking.">
  <meta name="keywords" content="học tiếng Nhật, kanji, JLPT, N5, N4, chiết tự, SRS, flashcard, Japanese study">
  <meta name="author" content="JpStudy">

  <!-- Open Graph -->
  <meta property="og:title" content="JpStudy — JLPT learning, FSRS spaced repetition, kanji practice">
  <meta property="og:description" content="JpStudy helps JLPT learners build vocabulary, grammar, kanji, and handwriting skills with FSRS spaced repetition and local-first progress tracking.">
  <meta property="og:type" content="website">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="JpStudy">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>JpStudy — JLPT learning, FSRS spaced repetition, kanji practice</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --jp-bg: #f5eee3;
      --jp-paper: rgba(255, 252, 247, 0.92);
      --jp-paper-border: rgba(213, 190, 158, 0.7);
      --jp-ink: #15202b;
      --jp-muted: rgba(21, 32, 43, 0.72);
      --jp-primary: #17324d;
      --jp-secondary: #20675b;
      --jp-accent: #d66a3d;
      --jp-glow: rgba(23, 50, 77, 0.12);
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.78), transparent 34%),
        radial-gradient(circle at bottom right, rgba(214,106,61,0.08), transparent 28%),
        linear-gradient(180deg, #fbf6ef 0%, var(--jp-bg) 100%);
      color: var(--jp-ink);
      font-family: "Manrope", "Segoe UI", sans-serif;
    }

    body {
      overflow: hidden;
    }

    #jpstudy-shell {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      z-index: 9999;
      transition: opacity 280ms ease, visibility 280ms ease;
    }

    #jpstudy-shell.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .jpstudy-shell-card {
      width: min(100%, 460px);
      padding: 28px 28px 24px;
      border-radius: 32px;
      border: 1px solid var(--jp-paper-border);
      background: linear-gradient(180deg, rgba(255,255,255,0.96), var(--jp-paper));
      box-shadow: 0 24px 70px var(--jp-glow);
      backdrop-filter: blur(12px);
    }

    .jpstudy-shell-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .jpstudy-mark {
      width: 58px;
      height: 58px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 28px;
      background: linear-gradient(145deg, var(--jp-primary), var(--jp-secondary));
      box-shadow: 0 14px 28px rgba(23, 50, 77, 0.18);
    }

    .jpstudy-shell-title {
      margin: 0;
      font-size: 1.5rem;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .jpstudy-shell-subtitle {
      margin: 4px 0 0;
      font-size: 0.96rem;
      line-height: 1.5;
      color: var(--jp-muted);
      font-weight: 600;
    }

    .jpstudy-shell-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .jpstudy-pill {
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--jp-primary);
      background: rgba(23, 50, 77, 0.08);
      border: 1px solid rgba(23, 50, 77, 0.12);
    }

    .jpstudy-progress {
      position: relative;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(23, 50, 77, 0.08);
      margin-bottom: 12px;
    }

    .jpstudy-progress::before {
      content: "";
      position: absolute;
      inset: 0;
      width: 42%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--jp-accent), #c35a1f);
      animation: jpstudy-load 1.6s ease-in-out infinite;
    }

    .jpstudy-shell-footnote {
      margin: 0;
      font-size: 0.88rem;
      line-height: 1.5;
      color: var(--jp-muted);
      font-weight: 600;
    }

    @keyframes jpstudy-load {
      0% { transform: translateX(-110%); }
      55% { transform: translateX(150%); }
      100% { transform: translateX(150%); }
    }
  </style>
</head>
<body>
  <div id="jpstudy-shell" aria-live="polite">
    <div class="jpstudy-shell-card">
      <div class="jpstudy-shell-top">
        <div class="jpstudy-mark">日</div>
        <div>
          <h1 class="jpstudy-shell-title">JpStudy Web</h1>
          <p class="jpstudy-shell-subtitle">
            Đang chuẩn bị không gian học tiếng Nhật trên trình duyệt.
          </p>
        </div>
      </div>
      <div class="jpstudy-shell-row">
        <span class="jpstudy-pill">Kanji</span>
        <span class="jpstudy-pill">SRS</span>
        <span class="jpstudy-pill">Ngữ pháp</span>
        <span class="jpstudy-pill">JLPT</span>
      </div>
      <div class="jpstudy-progress" role="presentation"></div>
      <p class="jpstudy-shell-footnote">
        Đang tải dữ liệu bài học, tiến độ học và giao diện web đầu tiên.
      </p>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener("flutter-first-frame", function () {
      const shell = document.getElementById("jpstudy-shell");
      if (shell) {
        shell.classList.add("is-hidden");
        window.setTimeout(() => shell.remove(), 320);
      }
    });
  </script>
</body>
</html>
