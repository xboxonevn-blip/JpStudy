name: UI String Guard

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  ui-string-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Check UI string literals
        run: python tooling/audit_ui_string_literals.py --check --max-candidates 0

      - name: Analyze
        run: flutter analyze


