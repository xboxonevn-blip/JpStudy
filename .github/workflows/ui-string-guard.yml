name: UI String Guard

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  ui-string-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Check UI string literals
        run: python tooling/audit_ui_string_literals.py --check --max-candidates 0

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web

  firebase-security-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Test Storage security rules
        run: npm run test:storage-rules


